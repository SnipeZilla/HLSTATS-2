##
## Database Settings
##

# DBHost - Database server "address" or "address:port". Address can be an IP or
#          a hostname. The default MySQL port is 3306 (tcp).
DBHost "localhost"

# DBUsername - User to connect to the database as.
DBUsername ""

# DBPassword - Password for the database user.
DBPassword ""

# DBName - Name of the database to use.
DBName ""

# DBDriver - "mysql" or "mariadb"
DBDriver "mysql"

##
## UDP Socket Settings (should match "logaddress ip port" on the game servers)
##

# BindIP - IP address to bind to (leave empty to use all interfaces).
BindIP ""

# Port - Port to listen on for log data from the game servers. this is also valid for proxy-daemon.pl
Port 27500

##
## Cpanel hack
##
## Set this to 1 if you use cpanel and need to use a user-installed Perl module
CpanelHack 0

##
## Event Queue
##
## Number of each type of events to queue before inserting events of that type
## larger installs may try raising this for better performance
EventQueueSize 10

# Daily CronJob
# Practical recommendation:
#    Linux: cron / Windows: Task Scheduler
# Absolute path
#    e.g. linux    PathPerl "/usr/bin/perl"
#    e.g. windows  PathPerl "C:\Strawberry\perl\bin\perl.exe"
#    e.g. linux    PathAwards "usr/bin/hlstats/hlstats-awards.pl"
#    e.g. windows  PathAwards "C:\hlxce\hlstats-awards.pl"
# importbans.pl -> edit DB credential inside this file (HLX DB Info & SourceBans DB)
#    e.g. linux    PathBans "usr/bin/hlstats/ImportBans/hlstatsbans.pl"
#    e.g. windows  PathBans "C:\hlxce\ImportBans\hlstatsbans.pl"
PathPerl ""
PathAwards ""
PathBans ""

# DebugLevel - 0 SILENT
#              1 HLSTATSZ
#              2 RAW INCOMING LOG
#              3 EVENT+RCON
#              4 MYSQL
#              5 Actions and Plyr Action Awards, helper to find missing action and award
#              9 ALL
# Set this to 1 or higher to have debugging information printed on stdout.
# Set to 0 for quiet operation or when you set up is working.
# It is recommended that you set this to 0.
DebugLevel 1

